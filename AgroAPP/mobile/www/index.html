<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2d6a4f" />
  <title>AgroApp</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(145deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: linear-gradient(145deg, #ffffff 0%, #f0f9f4 48%, #e3f2ea 100%);
      color: #1b4332;
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
      max-width: 22rem;
    }
    .row { display: flex; align-items: center; gap: 0.9rem; }
    .badge {
      width: 3.2rem; height: 3.2rem; border-radius: 16px;
      background: linear-gradient(145deg, #1b4332, #52b788);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.35);
    }
    .name {
      font-size: 1.9rem; font-weight: 800; margin: 0;
      background: linear-gradient(115deg, #1b4332, #40916c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .meta { font-size: 0.85rem; color: #4d6b5f; margin: 0.35rem 0 0; }
    .ver {
      font-weight: 700; color: #fff; font-size: 0.75rem;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      padding: 0.1rem 0.45rem; border-radius: 6px; margin-left: 0.25rem;
    }
    .hint { font-size: 0.8rem; color: #5a7d6e; margin-top: 1rem; line-height: 1.4; }
    code { background: #e8f5e9; padding: 0.1rem 0.3rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="badge" aria-hidden="true">🌾</div>
      <div>
        <p class="name">AgroApp</p>
        <p class="meta">By H.S.C. di Davide Capato - <span class="ver">1.0beta</span></p>
      </div>
    </div>
    <p class="hint">Configura l'URL del server in <code>capacitor.config.ts</code>, poi <code>npx cap sync</code>.</p>
  </div>
</body>
</html>
